km:
  pdf_template:
    pdf_template: бһӮбһҳбҹ’бһҡбһј PDF
    name: бһҲбҹ’бһҳбҹ„бҹҮ
    new_pdf_template: бһӮбһҳбҹ’бһҡбһј PDF бһҗбҹ’бһҳбһё
    edit_pdf_template: бһҖбҹӮбһҸбһҳбҹ’бһҡбһјбһңбһӮбһҳбҹ’бһҡбһј PDF
    language_code: бһ—бһ¶бһҹбһ¶
    content: бһ‘бҹҶбһҡбһ„бҹӢбһҳбһ¶бһҸбһ·бһҖбһ¶
    make_sure_you_save_it_before_preview: бһҸбҹ’бһҡбһјбһңбһ”бҹ’бһҡбһ¶бһҖбһҠбһҗбһ¶бһўбҹ’бһ“бһҖбһҡбһҖбҹ’бһҹбһ¶бһ‘бһ»бһҖбһңбһ¶бһҳбһ»бһ“бһ–бҹҒбһӣбһҳбһҫбһӣ
    are_you_sure_to_delete: бһҸбһҫбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһ¶бһҖбһҠбһҮбһ¶бһӣбһ»бһ”бһӮбһҳбҹ’бһҡбһј <b>%{name}</b> бһ“бҹҒбҹҮбһҳбҹӮбһ“бһ‘бҹҒ?
    pdf_templates: бһӮбһҳбҹ’бһҡбһј PDF
    tooltip:
      province: бһ”бһүбҹ’бһ…бһјбһӣбһҲбҹ’бһҳбҹ„бҹҮбһҒбҹҒбһҸбҹ’бһҸбһ“бҹғбһ”бҹҗбһҺбҹ’бһҺбһҠбһ¶бһҖбҹӢбһ–бһ·бһ“бҹ’бһ‘бһ»
      district: бһ”бһүбҹ’бһ…бһјбһӣбһҲбҹ’бһҳбҹ„бҹҮбһҹбҹ’бһҡбһ»бһҖбһ“бҹғбһ”бҹҗбһҺбҹ’бһҺбһҠбһ¶бһҖбҹӢбһ–бһ·бһ“бҹ’бһ‘бһ»
      commune: бһ”бһүбҹ’бһ…бһјбһӣбһҲбҹ’бһҳбҹ„бҹҮбһғбһ»бҹҶбһ“бҹғбһ”бҹҗбһҺбҹ’бһҺбһҠбһ¶бһҖбҹӢбһ–бһ·бһ“бҹ’бһ‘бһ»
      scorecard_type: бһ”бһүбҹ’бһ…бһјбһӣбһ”бҹ’бһҡбһ—бҹҒбһ‘бһ”бҹҗбһҺбҹ’бһҺбһҠбһ¶бһҖбҹӢбһ–бһ·бһ“бҹ’бһ‘бһ» (бһ§. бһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҒбҹ’бһӣбһҪбһ“бһҜбһ„, бһ”бҹҗбһҺбҹ’бһҺбһҠбһ¶бһҖбҹӢбһ–бһ·бһ“бҹ’бһ‘бһ»бһҹбһ бһӮбһҳбһ“бҹҚ)
      result_table: бһ”бһүбҹ’бһ…бһјбһӣбһҸбһ¶бһҡбһ¶бһ„бһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһўбһ¶бһ‘бһ·бһ—бһ¶бһ– (бһҮбһ¶бһҳбһҪбһҷбһ“бһ№бһ„бһӣбһҖбҹ’бһҒбһҺбҹҲбһңбһ·бһ“бһ·бһ…бҹ’бһҶбҹҗбһҷ бһ…бҹҶбһ“бһ»бһ…бһҒбҹ’бһӣбһ¶бҹҶбһ„ бһ…бҹҶбһ“бһ»бһ…бһҒбҹ’бһҹбҹ„бһҷ бһ“бһ·бһ„бһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–)
      facility: бһ”бһүбҹ’бһ…бһјбһӣбһҲбҹ’бһҳбҹ„бҹҮбһҹбҹҒбһңбһ¶бһ“бҹғбһ”бҹҗбһҺбҹ’бһҺбһҠбһ¶бһҖбҹӢбһ–бһ·бһ“бҹ’бһ‘бһ»бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһўбһ“бһ»бһңбһҸбҹ’бһҸ
      facilitators: бһ”бһүбҹ’бһ…бһјбһӣбһ”бһүбҹ’бһҮбһёбһҲбҹ’бһҳбҹ„бҹҮбһўбҹ’бһ“бһҖбһҹбһҳбҹ’бһҡбһ”бһҹбһҳбҹ’бһҡбһҪбһӣбһҠбҹӮбһӣбһ”бһ¶бһ“бһўбһ“бһ»бһңбһҸбҹ’бһҸбһ”бҹҗбһҺбҹ’бһҺбһҠбһ¶бһҖбҹӢбһ–бһ·бһ“бҹ’бһ‘бһ»
      local_ngo: бһ”бһүбҹ’бһ…бһјбһӣбһҲбҹ’бһҳбҹ„бҹҮбһўбһ„бҹ’бһӮбһҖбһ¶бһҡбһҳбһ·бһ“бһҳбҹӮбһ“бһҡбһҠбҹ’бһӢбһ¶бһ—бһ·бһ”бһ¶бһӣбһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҡбһ»бһҖбһҠбҹӮбһӣбһўбһ“бһ»бһңбһҸбҹ’бһҸ
      conducted_date: бһ”бһүбҹ’бһ…бһјбһӣбһҖбһ¶бһӣбһ”бһҡбһ·бһ…бҹ’бһҶбҹҒбһ‘бһҠбҹӮбһӣбһ”бҹҗбһҺбҹ’бһҺбһҠбһ¶бһҖбҹӢбһ–бһ·бһ“бҹ’бһ‘бһ»бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһўбһ“бһ»бһңбһҸбҹ’бһҸ
      conducted_year_ce: бһ”бһүбҹ’бһ…бһјбһӣбһҶбҹ’бһ“бһ¶бҹҶбһҠбҹӮбһӣбһ”бҹҗбһҺбҹ’бһҺбһҠбһ¶бһҖбҹӢбһ–бһ·бһ“бҹ’бһ‘бһ»бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһўбһ“бһ»бһңбһҸбҹ’бһҸ (бһ‘бһҳбҹ’бһҡбһ„бҹӢбһӮ.бһҹ)
      conducted_year_be: бһ”бһүбҹ’бһ…бһјбһӣбһҶбҹ’бһ“бһ¶бҹҶбһҠбҹӮбһӣбһ”бҹҗбһҺбҹ’бһҺбһҠбһ¶бһҖбҹӢбһ–бһ·бһ“бҹ’бһ‘бһ»бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһўбһ“бһ»бһңбһҸбҹ’бһҸ (бһ‘бһҳбҹ’бһҡбһ„бҹӢбһ–.бһҹ)
      conducted_location: бһ”бһүбҹ’бһ…бһјбһӣбһ‘бһёбһҸбһ¶бҹҶбһ„бһҠбҹӮбһӣбһ”бҹҗбһҺбҹ’бһҺбһҠбһ¶бһҖбҹӢбһ–бһ·бһ“бҹ’бһ‘бһ»бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһўбһ“бһ»бһңбһҸбҹ’бһҸ (бһ§. бһҲбҹ’бһҳбҹ„бҹҮбһҹбһ¶бһӣбһ¶бһ”бһӢбһҳбһҹбһ·бһҖбҹ’бһҹбһ¶, бһҲбҹ’бһҳбҹ„бҹҮбһҳбһ“бҹ’бһ‘бһёбһҡбһ–бҹҒбһ‘бҹ’бһҷ, бһҲбҹ’бһҳбҹ„бҹҮбһҡбҹ„бһ„бһ…бһҖбҹ’бһҡ)
